name: Front-End CI/CD

on:
  pull_request:
    branches: [ dev, main ]
    paths:
      - "front-end/**"
  push:
    branches: [ dev, main ]
    paths:
      - "front-end/**"
  workflow_dispatch:

permissions:
  contents: read

# ---------------------------------------------------------
# VARIÁVEIS GLOBAIS
# ---------------------------------------------------------
env:
  NODE_VERSION: '24.x'

jobs:
  validate-and-build:
    name: "Validate & Build (Lint, Type Check, Test)"
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./front-end

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './front-end/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run format:check

      - name: Lint Code
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Detect tests
        id: detect-tests
        run: |
          if find src -type f \( -name "*.test.ts" -o -name "*.test.tsx" -o -name "*.spec.ts" -o -name "*.spec.tsx" \) | grep -q .; then
            echo "HAS_TESTS=true" >> $GITHUB_ENV
          else
            echo "HAS_TESTS=false" >> $GITHUB_ENV
          fi

      - name: Run Tests
        if: env.HAS_TESTS == 'true'
        run: npm run test:ci

      - name: Skip tests
        if: env.HAS_TESTS == 'false'
        run: echo "Nenhum teste encontrado na pasta src. Pulando etapa de testes."

      - name: Verify Build
        run: npm run build