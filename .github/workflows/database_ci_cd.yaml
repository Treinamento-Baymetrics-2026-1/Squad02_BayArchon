name: Database Overall Review

on:
  pull_request:
    branches: [ dev, main ]
    paths:
      - "database/migrations/**"
  push:
    branches: [ dev, main ]
    paths: 
      - "database/migrations/**"
  workflow_dispatch:
    inputs:
      migrations_path:
        description: 'Diretório das migrações para teste manual'
        required: false
        default: 'database/migrations'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  DEFAULT_MIGRATIONS_PATH: "database/migrations"
  PYTHON_VERSION: "3.11"
  PG_VERSION: "17"
  FLYWAY_VERSION: "10.15.0"
  DB_TEST_USER: "admin"
  DB_TEST_PASS: "admin_password_ephemeral"
  DB_TEST_NAME: "app_test_db"

jobs:
  sql-linting:
    name: Running SQLFluff (syntax check)
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install SQLFluff
        run: pip install sqlfluff

      - name: Run SQLFluff Lint
        run: sqlfluff lint ${{ github.event.inputs.migrations_path || env.DEFAULT_MIGRATIONS_PATH }} --config .sqlfluff

  migration-test:
    name: Dry-Run Migrations
    runs-on: ubuntu-22.04
    needs: [ sql-linting ] 
    
    # VALORES HARDCODED:
    # Esse serviço é efemero e será destruido após seu uso.
    # Portanto, não há perigo em manter essas credenciais
    # simples expostas. Jamais use as do banco de verdade.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin_password_ephemeral
          POSTGRES_DB: app_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Cliente PostgreSQL
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Aplicar migrações (Dry-Run)
        env:
          PGPASSWORD: ${{ env.DB_TEST_PASS }}
          MIGRATIONS_DIR: ${{ github.event.inputs.migrations_path || env.DEFAULT_MIGRATIONS_PATH }}
        run: |
          echo "Iniciando a execução dos scripts na pasta $MIGRATIONS_DIR..."
          
          set -e 
          shopt -s nullglob
          
          for script in "$MIGRATIONS_DIR"/*.sql; do
            echo "Aplicando: $script"
            psql -h localhost -U ${{ env.DB_TEST_USER }} -d ${{ env.DB_TEST_NAME }} -f "$script"
            echo "✅ $script aplicado com sucesso!"
          done
          
      - name: Validação de Sucesso
        run: echo "🎉 Todos os scripts são válidos e o banco foi construído sem erros!"
    
  deploy-migrations-supabase:
    name: Deploy to Supabase via Flyway
    runs-on: ubuntu-22.04
    needs: [migration-test] 

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5.0.1

      - name: Instalar Flyway CLI
        run: |
          echo "Baixando e instalando o Flyway versão ${{ env.FLYWAY_VERSION }}..."
          wget -qO- https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/${{ env.FLYWAY_VERSION }}/flyway-commandline-${{ env.FLYWAY_VERSION }}-linux-x64.tar.gz | tar -xvz
          sudo ln -s $(pwd)/flyway-${{ env.FLYWAY_VERSION }}/flyway /usr/local/bin/flyway

      - name: Executar Deploy no Supabase
        env:
          MIGRATIONS_DIR: ${{ github.event.inputs.migrations_path || env.DEFAULT_MIGRATIONS_PATH }}
        run: |
          echo "Iniciando a migração em produção..."
          flyway \
            -url="${{ secrets.SUPABASE_DB_URL }}" \
            -user="${{ secrets.SUPABASE_DB_USER }}" \
            -password="${{ secrets.SUPABASE_DB_PASS }}" \
            -locations="filesystem:$MIGRATIONS_DIR" \
            -baselineOnMigrate="true" \
            migrate
